<div class="min-vh-100 d-flex flex-column align-items-center justify-content-center bg-light">

    <h5 class="fw-bold mb-5">Selecciona Sucursal</h5>
  
    <div class="d-flex gap-3">
      
      <button 
        *ngFor="let sucursal of listaSucursales" 
        class="btn btn-outline-secondary bg-white px-4 py-2 rounded-3 shadow-sm" 
        [routerLink]="['/sucursal', sucursal.id]">
        {{sucursal.nombre}}
      </button>
    </div>
  
  </div>

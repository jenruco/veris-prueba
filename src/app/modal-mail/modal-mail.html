<h2 mat-dialog-title style="text-align: center">Informativo</h2>
<mat-dialog-content class="mat-typography">
    <table class="table">
        <thead class="table-primary">
          <tr >
            <th scope="col">Tipo</th>
            <th scope="col">Cantidad</th>
            <th scope="col">Observación</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of listaEmails">
            <td>{{item.label}}</td>
            <td>{{item.total}}</td>
            <td>Observación de {{item.label}}</td>
          </tr>
        </tbody>
    </table>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <button class="btn btn-primary" mat-dialog-close>Aceptar</button>
</mat-dialog-actions>

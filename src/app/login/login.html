<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="bg-white p-5 shadow-sm" style="width: 100%; max-width: 520px;">
  
      <h5 class="text-center mb-4 fw-bold">Phantom<span class="text-primary">X</span></h5>
  
      <p class="text-muted mb-0">¡Bienvenido!</p>
      <h4 class="text-primary mb-4">Iniciar Sesión</h4>
  
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-control" id="usuario" name="usuario" [(ngModel)]="loginReq.usuario" />
      </div>
  
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="clave" name="clave" [(ngModel)]="loginReq.clave" />
      </div>
  
      <button type="submit" class="btn btn-success w-100" (click)="iniciarSesion()">Continuar</button>
  
    </div>
  </div>
